<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
        }
        .form-wrapper{
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin-top: 20px;
        }
        #expenseForm{
            width: 100%;
            max-width: 700px;
        }
        .container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: #1e293b;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
            text-align: center;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #334155;
        }

        .main {
            flex: 1;
            padding: 20px;
        }

        .topbar {
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .topbar h1 {
            font-size: 24px;
            color: #1e293b;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h3 {
            color: #475569;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .card p {
            font-size: 28px;
            font-weight: bold;
            color: #0f172a;
        }

        .content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .table-section,
        .form-section {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .table-section h2,
        .form-section h2 {
            margin-bottom: 15px;
            color: #1e293b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th, table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        table th {
            background: #e2e8f0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #334155;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
        }
        .edit-btn {
            background-color: #f59e0b;   /* Orange */
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 6px;
            font-size: 14px;
            transition: 0.3s;
        }

        .edit-btn:hover {
            background-color: #d97706;   /* Dark orange */
        }

        .delete-btn {
            background-color: #ef4444;   /* Red */
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .delete-btn:hover {
            background-color: #dc2626;   /* Dark red */
        }

        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        @media(max-width: 900px) {
            .cards {
                grid-template-columns: 1fr;
            }

            .content {
                
                display: grid;
                grid-template-columns: 2fr 1fr;
            }

            .sidebar {
                display: none;
            }
        }
    </style>
    
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <h2>Expense Tracker</h2>
            <a href="javascript:void(0)" onclick="dashboardView()">Dashboard</a>
            <a href="javascript:void(0)" onclick="addform()">Add Expense</a>
            <a href="javascript:void(0)" onclick="trans()">Transactions</a>
            <!-- <a href="#">Reports</a> -->
            <a href="javascript:void(0)" onclick="logoutConfirm()">Logout</a>
        </div>

        <div class="main">
            <div class="topbar">
                <h1>Welcome, <span th:text="${user.name}"></span></h1>
                <p id="todayDate"></p>
            </div>

            <div class="cards">

                <div class="card">
                    <h3>Fixed Month Salary</h3>
                    <p id="fixedsalary">₹0</p>
                </div>

                <div class="card">
                    <h3>Remaining Budget</h3>
                    <p id="remainingBudget">₹0</p>
                </div>

                <div class="card">
                    <h3>Total Expense</h3>
                    <p id="totalExpense">₹0</p>
                </div>
                <!-- <div class="card">
                    <h3>This Month</h3>
                    <p id="monthExpense">₹0</p>
                </div> -->

            </div>


            <div class="content">
                <div class="table-section" id="recenttrans" style="display:none;">
                    <h2>Recent Transactions</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Amount</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="expenseTableBody">
                        </tbody>
                    </table>
                </div>

                <div id="chart" class="table-section" style="display:none;"></div>

            <div class="d-flex justify-content-center align-items-start mt-3">
                    <div class="form-section" id="expenseForm">
                        <h2 id="formTitle">Add Expense</h2>
                        <form th:action="@{/userexpensesave}" method="post">
                            <input type="hidden" id="expenseId" name="id">
                            <div class="form-group">
                                <label>Amount</label>
                                <input type="number" id="amount" name="amount" required>
                            </div>

                            <div class="form-group">
                                <label>Category</label>
                                <select id="category" name="category" required>
                                    <option value="">Select</option>
                                    <option>Food</option>
                                    <option>Travel</option>
                                    <option>Shopping</option>
                                    <option>Bills</option>
                                    <option>Health</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Date</label>
                                <input type="date" id="date" name="expenseDate" required>
                            </div>

                            <button type="submit" class="btn" id="submitBtn">Add Expense</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>


<script>

    document.getElementById("todayDate").innerText = new Date().toDateString();
    let chart;
    async function loadDashboard(){

        const response = await fetch("/api/expenses");

        const expenses = await response.json();

        const fixedsal = await fetch("/getsalary");
        const fsl = await fixedsal.json();

        const tableBody = document.getElementById("expenseTableBody");
        let fs = Number(fsl);

       // document.getElementById("fixedsalary").innerText = `₹${fs}`;

        tableBody.innerHTML = "";

        let total = 0;

        expenses.forEach(expense => {

            total += expense.amount;

            const row = `
            <tr>
                <td>${expense.expenseDate}</td>
                <td>${expense.category}</td>
                <td>₹${expense.amount}</td>
                <td>
                    <button class="edit-btn" onclick="editExpense(${expense.id})">Edit</button>
                    <button class="delete-btn" onclick="deleteExpense(${expense.id})">Delete</button>
                </td>
            </tr>
            `;
             
            tableBody.innerHTML += row;

        });

        document.getElementById("totalExpense").innerText = `₹${total}`;
        // document.getElementById("monthExpense").innerText = `₹${total}`;
        document.getElementById("remainingBudget").innerText = `₹${fs-total}`;
        
        document.getElementById("fixedsalary").innerText = `₹${fs}`; 

    }

    function deleteExpense(id){

        Swal.fire({
            title: "Are you sure?",
            text: "This expense will be deleted!",
            icon: "warning",
            showCancelButton: true,
            confirmButtonText: "Yes, Delete"
        }).then((result) => {

            if(result.isConfirmed){

                fetch(`/deleteExpense/${id}`, {
                    method: "DELETE"
                })
                .then(() => {
                    Swal.fire("Deleted!", "Expense removed", "success");

                    loadDashboard();   
                })
                .catch(() => {
                    Swal.fire("Error!", "Delete failed", "error");
                });

            }
    });
    
}
    function editExpense(id){
        
        fetch("/api/expenses")
            .then(response => response.json())
            .then(expenses => {

                if (!expenses || expenses.length === 0) {
                    Swal.fire("Error!", "No expenses found", "error");
                    return;
                }

                const expense = expenses.find(exp => exp.id == id);

                if (!expense) {
                    Swal.fire("Error!", "Expense not found", "error");
                    return;
                }

                addform(); // ✅ FIXED

                document.getElementById("expenseId").value = expense.id;
                document.getElementById("amount").value = expense.amount;
                document.getElementById("category").value = expense.category;
                document.getElementById("date").value = expense.expenseDate;

                document.getElementById("submitBtn").innerText = "Update Expense";
                document.getElementById("formTitle").innerText = "Update Expense";
            })
            .catch((err) => {
                console.error(err);  //debug
                Swal.fire("Error!", "Unable to load expense details", "error");
        });

    }

    async function dashboardView() {
        document.getElementById("expenseForm").style.display = "none";
        document.getElementById("recenttrans").style.display = "none";
        document.getElementById("chart").style.display = "block";
        document.querySelector(".content").style.gridTemplateColumns = "1fr";

        await showChart();
    }
     loadDashboard();

    function addform(){
        document.getElementById("expenseForm").style.display="block"
        document.getElementById("recenttrans").style.display="none"
        document.getElementById("chart").style.display = "none";
       // document.querySelector(".content").style.gridTemplateColumns = "1fr";
    }

    function trans(){  
        document.getElementById("recenttrans").style.display="block"    
        document.getElementById("expenseForm").style.display="none"  
        document.getElementById("chart").style.display = "none";
         //document.querySelector(".content").style.gridTemplateColumns = "2fr 1fr";
    }

    function logoutConfirm(){
        Swal.fire({
            title: "Are you sure?",
            text: "You will be logged out",
            icon: "warning",
            showCancelButton: true,
            confirmButtonText: "Yes, Logout",
            cancelButtonText: "Cancel"
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = "/logout";
            }
        });
    }

    async function showChart() {
            document.getElementById("expenseForm").style.display = "none";
            document.getElementById("recenttrans").style.display = "none";
            document.getElementById("chart").style.display = "block";
            document.querySelector(".content").style.gridTemplateColumns = "1fr";
            

            const response = await fetch("/api/expenses");
            const expenses = await response.json();

            let categoryMap = {};

            expenses.forEach(expense => {
                let category = expense.category;
                let amount = Number(expense.amount);

                if (categoryMap[category]) {
                    categoryMap[category] += amount;
                } else {
                    categoryMap[category] = amount;
                }
            });

            let labels = Object.keys(categoryMap);
            let series = Object.values(categoryMap);

            if (chart) {
                chart.destroy();
            }

            let options = {
                chart: {
                    type: 'pie',
                    height: 400
                },
                series: series,
                labels: labels
            };

            chart = new ApexCharts(document.querySelector("#chart"), options);
            chart.render();
}

    
</script>

    <script th:if="${successMessage}">
        Swal.fire({
            title: "Success!",
            text: "[[${successMessage}]]",
            icon: "success",
            confirmButtonText: "OK"
        });
    </script>

    <script th:if="${openDashboard}">
        dashboardView();
    </script>

    <script th:unless="${openDashboard}">
        dashboardView();
    </script>


</body>
</html>
